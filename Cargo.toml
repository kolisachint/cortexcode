cortexcode-tui-terminal = { path = "crates/cortexcode-tui-terminal" }
cortexcode-tui-util = { path = "crates/cortexcode-tui-util" }

[workspace.metadata.cortex]
# Lockstep version bump script uses this as the single source of truth.
# All crates must share the workspace `version` above.
