[package]
name = "cortexcode-code-tools"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Coding tools for the cortex coding agent"
readme = "README.md"

[package.metadata.cortex]
publish = true

[dependencies]
cortexcode-agent-types = { workspace = true }
cortexcode-ai-types = { workspace = true }
cortexcode-code-config = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex-lite = "0.1"
glob = "0.3"
walkdir = "2"
reqwest = { version = "0.12", features = ["blocking"] }
urlencoding = "2"
